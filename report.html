<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Сообщить о баге — STALWORLD</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="index.html" class="logo"><span>STAL</span>WORLD</a>
      <nav>
        <a href="index.html">Баги</a>
        <a href="report.html" class="active">Сообщить</a>
      </nav>
      <nav id="authNav" class="auth-nav"></nav>
    </div>
  </header>

  <main class="container form-page">
    <h1>Сообщить о баге</h1>
    <p id="reportIntro">Войдите в аккаунт, чтобы отправить репорт.</p>

    <div id="authRequired" class="notice hidden">
      <a href="login.html?next=report.html">Войдите</a> или <a href="register.html">зарегистрируйтесь</a>.
    </div>

    <div id="reportBlock" class="hidden">
      <div class="notice">Откроется GitHub Issue в <code id="repoName"></code>.</div>
      <div id="successNotice" class="notice hidden" style="border-color:var(--green);background:#1a2a1a">
        GitHub Issue открыт. Спасибо!
      </div>

      <form id="reportForm">
        <div class="form-group">
          <label for="title">Заголовок *</label>
          <input type="text" id="title" required placeholder="Кратко: что сломалось">
        </div>
        <div class="form-group">
          <label for="description">Описание *</label>
          <textarea id="description" required placeholder="Что произошло? Что ожидали?"></textarea>
        </div>
        <div class="form-group">
          <label for="steps">Шаги воспроизведения</label>
          <textarea id="steps" placeholder="1. Зайти на сервер&#10;2. ...&#10;3. Баг проявляется"></textarea>
        </div>
        <div class="form-group">
          <label for="screenshotFile">Скриншот</label>
          <input type="file" id="screenshotFile" accept="image/*">
          <small>Загрузится на Imgur или вставьте ссылку ниже</small>
        </div>
        <div class="form-group">
          <label for="screenshotUrl">Ссылка на скриншот</label>
          <input type="url" id="screenshotUrl" placeholder="https://i.imgur.com/... (необязательно)">
        </div>
        <div id="screenshotPreview"></div>
        <div class="form-group">
          <label for="category">Категория</label>
          <select id="category"></select>
        </div>
        <div class="form-group">
          <label for="priority">Приоритет</label>
          <select id="priority"></select>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary" id="submitBtn">Отправить на GitHub</button>
          <a href="index.html" class="btn btn-secondary">Назад</a>
        </div>
      </form>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container"><span id="footerText"></span></div>
  </footer>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="js/config.js"></script>
  <script src="js/bug-utils.js"></script>
  <script src="js/firebase-app.js"></script>
  <script src="js/auth-service.js"></script>
  <script src="js/logger.js"></script>
  <script src="js/nav-auth.js"></script>
  <script src="js/report.js"></script>
</body>
</html>
