<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Баг-трекер STALWORLD">
  <title>Bug Tracker — STALWORLD</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-pending">
  <header class="site-header">
    <div class="container">
      <a href="index.html" class="logo"><span>STAL</span>WORLD</a>
      <nav>
        <a href="index.html" class="active">Баги</a>
        <a href="report.html">Сообщить</a>
      </nav>
      <nav id="authNav" class="auth-nav"></nav>
      <a href="report.html" class="btn btn-primary">+ Новый баг</a>
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <h1>Баг-трекер</h1>
      <p>Обращения и обсуждения — прямо на сайте. Критические баги выделены красным.</p>
      <div class="stats">
        <div class="stat"><div class="num" id="statTotal">0</div><div class="label">Всего</div></div>
        <div class="stat stat-critical"><div class="num" id="statCritical">0</div><div class="label">Критических</div></div>
        <div class="stat"><div class="num" id="statOpen">0</div><div class="label">Открытых</div></div>
        <div class="stat"><div class="num" id="statFixed">0</div><div class="label">Исправлено</div></div>
      </div>
    </section>

    <div class="filters">
      <input type="search" id="searchInput" placeholder="Поиск...">
      <select id="priorityFilter"><option value="">Все приоритеты</option></select>
      <select id="statusFilter"><option value="">Все статусы</option></select>
      <select id="categoryFilter"><option value="">Все категории</option></select>
    </div>

    <div id="bugList" class="bug-list"></div>
    <div id="emptyState" class="empty hidden">Багов пока нет. <a href="report.html">Сообщить первым</a></div>
  </main>

  <footer class="site-footer">
    <div class="container"><span id="footerText"></span></div>
  </footer>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="js/config.js"></script>
  <script src="js/bug-utils.js"></script>
  <script src="js/firebase-app.js"></script>
  <script src="js/auth-service.js"></script>
  <script src="js/auth-guard.js"></script>
  <script src="js/logger.js"></script>
  <script src="js/bugs-service.js"></script>
  <script src="js/user-profile.js"></script>
  <script src="js/nav-auth.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
