<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Админка — STALWORLD</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="index.html" class="logo"><span>STAL</span>WORLD</a>
      <nav>
        <a href="index.html">Баги</a>
        <a href="report.html">Сообщить</a>
        <a href="admin.html" class="active">Админка</a>
      </nav>
      <nav id="authNav" class="auth-nav"></nav>
    </div>
  </header>

  <div id="loginScreen" class="container">
    <div class="login-box">
      <h1>Админка</h1>
      <p>Вход для администраторов.</p>
      <form id="loginForm">
        <div class="form-group">
          <label for="adminEmail">Email</label>
          <input type="email" id="adminEmail" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="adminPassword">Пароль</label>
          <input type="password" id="adminPassword" required autocomplete="current-password">
        </div>
        <p id="loginError" class="form-error"></p>
        <button type="submit" class="btn btn-primary">Войти</button>
      </form>
    </div>
  </div>

  <div id="adminScreen" class="container hidden">
    <section class="hero" style="padding-bottom:0">
      <h1>Админ-панель</h1>
      <p class="muted">Баги хранятся в Firestore — изменения сразу на сайте.</p>
      <div class="admin-tabs">
        <button type="button" class="admin-tab active" data-tab="bugs">Баги</button>
        <button type="button" class="admin-tab" data-tab="logs">Логи</button>
      </div>
      <div class="admin-toolbar">
        <button id="btnNew" class="btn btn-secondary">+ Новый баг</button>
        <button id="btnSeed" class="btn btn-secondary">Импорт из bugs.json</button>
        <button id="btnLogout" class="btn btn-danger">Выйти</button>
      </div>
    </section>

    <div id="tabBugs">
      <div class="admin-layout">
        <div class="admin-panel admin-panel--list">
          <div class="admin-panel-head">
            <h2>Баги</h2>
            <input type="search" id="adminSearch" placeholder="Поиск...">
          </div>
          <div id="adminBugList" class="admin-bug-list"></div>
        </div>

        <div class="admin-panel admin-panel--editor">
          <h2>Редактор</h2>
          <form id="bugEditForm">
            <div class="id-display">
              <span>ID</span>
              <strong id="editIdDisplay">—</strong>
              <a id="editOpenLink" href="#" target="_blank" class="hidden">Открыть на сайте →</a>
              <small>при создании ID присваивается автоматически</small>
            </div>

            <div class="form-group">
              <label for="editTitle">Заголовок</label>
              <input type="text" id="editTitle" required>
            </div>
            <div class="form-group">
              <label for="editDescription">Описание</label>
              <textarea id="editDescription"></textarea>
            </div>
            <div class="form-group">
              <label for="editSteps">Шаги</label>
              <textarea id="editSteps"></textarea>
            </div>
            <div class="form-group">
              <label for="editScreenshotUrl">Ссылка на скриншот</label>
              <input type="url" id="editScreenshotUrl" placeholder="https://...">
              <small>Прямая ссылка на изображение</small>
            </div>
            <div id="editScreenshotPreview"></div>

            <div class="form-row">
              <div class="form-group">
                <label for="editCategory">Категория</label>
                <select id="editCategory"></select>
              </div>
              <div class="form-group">
                <label for="editPriority">Приоритет</label>
                <select id="editPriority" class="priority-select"></select>
              </div>
              <div class="form-group">
                <label for="editStatus">Статус</label>
                <select id="editStatus"></select>
              </div>
            </div>
            <div class="form-group">
              <label for="editReporter">Автор</label>
              <input type="text" id="editReporter">
            </div>
            <div class="form-actions">
              <button type="submit" class="btn btn-primary">Сохранить</button>
              <button type="button" class="btn btn-danger" id="btnDelete">Удалить</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <div id="tabLogs" class="hidden" style="margin-bottom:60px">
      <div class="admin-panel">
        <h2>Журнал событий</h2>
        <p class="muted" style="margin-bottom:14px">Логи нельзя удалить через сайт.</p>
        <div id="logsTable"></div>
      </div>
    </div>
  </div>

  <footer class="site-footer">
    <div class="container"><span id="footerText"></span></div>
  </footer>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="js/config.js"></script>
  <script src="js/bug-utils.js"></script>
  <script src="js/firebase-app.js"></script>
  <script src="js/auth-service.js"></script>
  <script src="js/logger.js"></script>
  <script src="js/bugs-service.js"></script>
  <script src="js/nav-auth.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
