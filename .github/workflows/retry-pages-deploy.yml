name: Retry Pages Deploy

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  retry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trigger redeploy with empty commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "Retry GitHub Pages deploy [manual trigger]"
          git push
