<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Регистрация — STALWORLD</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="index.html" class="logo"><span>STAL</span>WORLD</a>
      <nav id="authNav" class="auth-nav"></nav>
    </div>
  </header>

  <main class="container">
    <div class="login-box">
      <h1>Регистрация</h1>
      <p>Создайте аккаунт для отправки баг-репортов.</p>
      <form id="registerForm">
        <div class="form-group">
          <label for="nickname">Никнейм</label>
          <input type="text" id="nickname" required maxlength="32" placeholder="Stalker123">
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="password">Пароль</label>
          <input type="password" id="password" required minlength="6" autocomplete="new-password">
          <small>Минимум 6 символов</small>
        </div>
        <p id="registerError" class="form-error"></p>
        <button type="submit" class="btn btn-primary">Создать аккаунт</button>
        <p style="margin-top:14px;font-size:0.9rem;color:var(--text-muted)">
          Уже есть аккаунт? <a href="login.html">Вход</a>
        </p>
      </form>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container"><span id="footerText"></span></div>
  </footer>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="js/config.js"></script>
  <script src="js/firebase-app.js"></script>
  <script src="js/auth-service.js"></script>
  <script src="js/logger.js"></script>
  <script src="js/nav-auth.js"></script>
  <script src="js/register.js"></script>
</body>
</html>
